name: Langfuse CI (prod)

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Testing prompt: ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}"
          # Add your test commands
          # npm test
          # python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: contains(github.event.client_payload.prompt.labels, 'production')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying ${{ github.event.client_payload.prompt.name }} v${{ github.event.client_payload.prompt.version }}"
          # Your deployment commands

      # Example: Access webhook data in your workflow
      - name: Process prompt data
        run: |
          echo "Action: ${{ github.event.client_payload.action }}"
          echo "Prompt: ${{ github.event.client_payload.prompt.name }}"
          echo "Version: ${{ github.event.client_payload.prompt.version }}"
          echo "Labels: ${{ github.event.client_payload.prompt.labels }}"

      - name: Promote prompt to prod Langfuse project
        env:
          LANGFUSE_PROD_PUBLIC_KEY: ${{ secrets.LANGFUSE_PROD_PUBLIC_KEY }}
          LANGFUSE_PROD_SECRET_KEY: ${{ secrets.LANGFUSE_PROD_SECRET_KEY }}
        run: |
          PROMPT_PAYLOAD=$(echo '${{ toJson(github.event.client_payload.prompt) }}' | \
            jq '{
              name: .name,
              type: .type,
              prompt: .prompt,
              labels: ["production"],
              config: .config,
              tags: .tags,
              commitMessage: .commitMessage
            }')

          curl -f -X POST \
            -u "${LANGFUSE_PROD_PUBLIC_KEY}:${LANGFUSE_PROD_SECRET_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PROMPT_PAYLOAD}" \
            https://cloud.langfuse.com/api/public/v2/prompts
