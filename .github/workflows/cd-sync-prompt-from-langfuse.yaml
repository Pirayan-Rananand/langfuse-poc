name: Langfuse Prompt Sync

# Triggered by Langfuse webhooks when a prompt is labeled "production" in nonprod.
# Delegates the actual promotion logic to the reusable pipeline workflow.

on:
  repository_dispatch:
    types: [langfuse-prompt-update]
  workflow_dispatch:
    inputs:
      prompt_json:
        description: "Full Langfuse prompt object as JSON (for manual testing)"
        required: false
        default: "{}"

jobs:
  promote:
    # For repository_dispatch: only run when the nonprod prompt has the production label.
    # For workflow_dispatch: always run (used for manual testing with prompt_json input).
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.client_payload.prompt.labels, 'production')
    uses: ./.github/workflows/prompt-promotion-pipeline.yaml
    with:
      prompt_json: >-
        ${{
          github.event_name == 'repository_dispatch'
          && toJson(github.event.client_payload.prompt)
          || inputs.prompt_json
        }}
    secrets: inherit
